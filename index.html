<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Karachi Tailors - Tailoring Shop Management</title>
    <meta name="description" content="Karachi Tailors - Offline-first tailoring shop management PWA with order tracking, measurements, and worker management." />
    <meta name="author" content="Karachi Tailors" />
    <meta property="og:title" content="Karachi Tailors" />
    <meta property="og:description" content="Offline-first tailoring shop management app" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#1a6b4a" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KT Tailors" />
    <script>
      // Apply saved theme before render to prevent flash
      const t = localStorage.getItem('kt-theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
